[pytest]
# The exercise structure names the test file "sample_api.test.py", which does
# not match pytest's default discovery patterns. Add the *.test.py pattern so
# the file is collected automatically, and use importlib import mode so files
# with dots in their stem load without polluting sys.modules.
python_files = *.test.py test_*.py *_test.py
addopts = --import-mode=importlib
testpaths = src/tests
